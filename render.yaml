databases:
  - name: todo-db
    plan: free
    databaseName: todo
    user: todo

services:
  - type: web
    name: todo-app
    runtime: node
    buildCommand: rm -rf node_modules && npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
