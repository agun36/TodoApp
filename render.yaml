services:
  - type: web
    name: todoapp
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: todoappdb
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
